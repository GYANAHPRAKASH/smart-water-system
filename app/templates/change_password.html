{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 68vh;">
    <div class="col-md-6 col-lg-4 fade-in-up">
        <div class="card glass-card border-0 p-3 shadow-lg">
            <div class="card-body py-4">
                <div class="text-center mb-4">
                    <div class="d-inline-flex rounded-circle p-3 mb-3 shadow-sm"
                        style="background: linear-gradient(135deg, #fde8e9, #f5b7bb);">
                        <i class="bi bi-shield-lock-fill fs-1 text-danger"></i>
                    </div>
                    <h3 class="fw-bold mb-1" style="color: var(--deep-ocean);">Change Password</h3>
                    <p class="text-muted mb-0" style="font-size: 0.92rem;">Update your AquaFlow account password</p>
                </div>

                <form method="POST">
                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="current_password"
                            name="current_password" placeholder="Current Password" required autocomplete="current-password">
                        <label for="current_password" class="text-muted">
                            <i class="bi bi-lock me-1"></i> Current Password
                        </label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="new_password"
                            name="new_password" placeholder="New Password" required autocomplete="new-password">
                        <label for="new_password" class="text-muted">
                            <i class="bi bi-lock-fill me-1"></i> New Password
                        </label>
                    </div>
                    <div class="form-floating mb-4">
                        <input type="password" class="form-control" id="confirm_password"
                            name="confirm_password" placeholder="Confirm New Password" required autocomplete="new-password">
                        <label for="confirm_password" class="text-muted">
                            <i class="bi bi-lock-fill me-1"></i> Confirm New Password
                        </label>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-danger btn-lg rounded-pill fw-bold shadow">
                            <i class="bi bi-shield-check me-2"></i> Update Password
                        </button>
                    </div>
                </form>

                <hr class="my-4 opacity-25">
                <div class="text-center">
                    {% if current_user.role == 'admin' %}
                    <a href="{{ url_for('admin.dashboard') }}" class="text-primary fw-bold text-decoration-none small">
                        <i class="bi bi-arrow-left me-1"></i> Back to Dashboard
                    </a>
                    {% else %}
                    <a href="{{ url_for('user.dashboard') }}" class="text-primary fw-bold text-decoration-none small">
                        <i class="bi bi-arrow-left me-1"></i> Back to Dashboard
                    </a>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
