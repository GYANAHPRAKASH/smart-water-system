{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card glass-card border-0 p-4">
            <div class="card-body">
                <h3 class="text-center mb-4 text-primary fw-bold">Login</h3>
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control rounded-pill" id="username" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control rounded-pill" id="password" name="password" required>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-aqua rounded-pill fw-bold">Login</button>
                    </div>
                </form>
                <div class="text-center mt-3">
                    <small>Don't have an account? <a href="{{ url_for('auth.register') }}"
                            class="text-decoration-none">Register here</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
