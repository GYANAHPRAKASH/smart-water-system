{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card glass-card border-0 p-4">
            <div class="card-body">
                <h3 class="text-center mb-4 text-primary fw-bold">Register</h3>
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="first_name" class="form-label">First Name</label>
                            <input type="text" class="form-control rounded-pill" id="first_name" name="first_name"
                                required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="last_name" class="form-label">Last Name</label>
                            <input type="text" class="form-control rounded-pill" id="last_name" name="last_name"
                                required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control rounded-pill" id="username" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control rounded-pill" id="password" name="password" required>
                    </div>
                    <div class="mb-3">
                        <label for="phone" class="form-label">Phone Number</label>
                        <input type="tel" class="form-control rounded-pill" id="phone" name="phone" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="door_no" class="form-label">Door Number</label>
                            <input type="text" class="form-control rounded-pill" id="door_no" name="door_no" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="colony" class="form-label">Colony Name</label>
                            <input type="text" class="form-control rounded-pill" id="colony" name="colony" required>
                        </div>
                    </div>
                    <div class="d-grid gap-2 mt-3">
                        <button type="submit" class="btn btn-aqua rounded-pill fw-bold">Register</button>
                    </div>
                </form>
                <div class="text-center mt-3">
                    <small>Already have an account? <a href="{{ url_for('auth.login') }}"
                            class="text-decoration-none">Login here</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
