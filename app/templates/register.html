{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 75vh; padding-top: 1rem;">
    <div class="col-md-9 col-lg-7 fade-in-up">
        <div class="card glass-card border-0 p-3 shadow-lg">
            <div class="card-body p-md-4">

                <!-- Header -->
                <div class="text-center mb-4">
                    <div class="d-inline-flex rounded-circle p-3 mb-3 shadow-sm"
                        style="background: linear-gradient(135deg, var(--aqua-light), rgba(144,224,239,0.4));">
                        <i class="bi bi-person-plus-fill fs-1 text-primary"></i>
                    </div>
                    <h3 class="fw-bold mb-1" style="color: var(--deep-ocean);">Create Account</h3>
                    <p class="text-muted mb-0" style="font-size: 0.92rem;">Join the AquaFlow community today</p>
                </div>

                <form method="POST">
                    <!-- Personal Info -->
                    <p class="text-muted fw-bold mb-3 small text-uppercase" style="letter-spacing: 0.8px;">
                        <i class="bi bi-person-circle me-1 text-primary"></i> Personal Info
                    </p>
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="first_name" name="first_name"
                                    placeholder="First Name" required>
                                <label for="first_name" class="text-muted">First Name</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="last_name" name="last_name"
                                    placeholder="Last Name" required>
                                <label for="last_name" class="text-muted">Last Name</label>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="input-group shadow-sm" style="border-radius: 0.375rem; overflow: hidden;">
                                <span class="input-group-text bg-white text-muted border-end-0 border" style="padding-top: 1rem; padding-bottom: 1rem;">
                                    <i class="bi bi-telephone ms-1 me-1"></i> <strong class="text-dark">+91</strong>
                                </span>
                                <div class="form-floating flex-grow-1">
                                    <input type="tel" class="form-control border-start-0 ps-2 shadow-none border" id="phone" name="phone"
                                        placeholder="Phone Number" required pattern="\d{10}" maxlength="10" title="Must be exactly 10 digits">
                                    <label for="phone" class="text-muted" style="left: -4px;">
                                        10-digit Phone Number
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <hr class="opacity-15 mb-3">

                    <!-- Credentials -->
                    <p class="text-muted fw-bold mb-3 small text-uppercase" style="letter-spacing: 0.8px;">
                        <i class="bi bi-shield-lock me-1 text-primary"></i> Account Credentials
                    </p>
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="username" name="username"
                                    placeholder="Username" required minlength="4" autocomplete="username">
                                <label for="username" class="text-muted">
                                    <i class="bi bi-person me-1"></i> Username
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="password" class="form-control" id="password" name="password"
                                    placeholder="Password" required minlength="6" autocomplete="new-password">
                                <label for="password" class="text-muted">
                                    <i class="bi bi-lock me-1"></i> Password
                                </label>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="form-floating">
                                <input type="email" class="form-control" id="email" name="email"
                                    placeholder="Email" required>
                                <label for="email" class="text-muted">
                                    <i class="bi bi-envelope me-1"></i> Email Address
                                </label>
                            </div>
                        </div>
                    </div>

                    <hr class="opacity-15 mb-3">

                    <!-- Address -->
                    <p class="text-muted fw-bold mb-3 small text-uppercase" style="letter-spacing: 0.8px;">
                        <i class="bi bi-house me-1 text-primary"></i> Address
                    </p>
                    <div class="row g-3 mb-4">
                        <div class="col-md-5">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="door_no" name="door_no"
                                    placeholder="Door No" required>
                                <label for="door_no" class="text-muted">Door Number</label>
                            </div>
                        </div>
                        <div class="col-md-7">
                            <div class="form-floating">
                                <select class="form-select" id="colony" name="colony" required>
                                    <option value="" disabled selected>Select your colony</option>
                                    <option value="Anna Nagar">Anna Nagar</option>
                                    <option value="Nungambakkam">Nungambakkam</option>
                                    <option value="T. Nagar">T. Nagar</option>
                                    <option value="Alwarpet">Alwarpet</option>
                                    <option value="Gopalapuram">Gopalapuram</option>
                                </select>
                                <label for="colony" class="text-muted">
                                    <i class="bi bi-geo-alt me-1"></i> Colony Name
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-aqua btn-lg rounded-pill fw-bold shadow">
                            <i class="bi bi-check-circle me-2"></i> Register Account
                        </button>
                    </div>
                </form>

                <hr class="my-4 opacity-25">
                <div class="text-center">
                    <p class="text-muted mb-0" style="font-size: 0.9rem;">
                        Already have an account?
                        <a href="{{ url_for('auth.login') }}"
                            class="text-primary fw-bold text-decoration-none nav-hover ms-1">Login here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
